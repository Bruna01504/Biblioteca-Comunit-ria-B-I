<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBiblio - Sistema de Biblioteca</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card-stat {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-stat:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .tab-content {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- Sidebar / Nav -->
    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="text-2xl">📚</span>
                <h1 class="text-xl font-bold tracking-tight">BioBiblio <span class="font-light opacity-80 text-sm">Comunitária</span></h1>
            </div>
            <div class="flex space-x-1 md:space-x-4 bg-indigo-800/50 p-1 rounded-lg">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="px-4 py-2 rounded-md hover:bg-indigo-600 transition-colors font-medium cursor-pointer active-tab bg-indigo-600">Painel</button>
                <button onclick="switchTab('leitores')" id="nav-leitores" class="px-4 py-2 rounded-md hover:bg-indigo-600 transition-colors font-medium cursor-pointer">Leitores</button>
                <button onclick="switchTab('livros')" id="nav-livros" class="px-4 py-2 rounded-md hover:bg-indigo-600 transition-colors font-medium cursor-pointer">Livros</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8">
        
        <!-- Estatísticas Rápidas -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 card-stat">
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-blue-50 rounded-lg text-blue-600">
                        <i class="fas fa-hand-holding-heart"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Empréstimos ativos</h3>
                </div>
                <p id="stat-ativos" class="text-4xl font-bold text-indigo-900">0</p>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 card-stat">
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-red-50 rounded-lg text-red-600">
                        <i class="fas fa-clock"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Em atraso</h3>
                </div>
                <p id="stat-atraso" class="text-4xl font-bold text-red-600">0</p>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 card-stat">
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-green-50 rounded-lg text-green-600">
                        <i class="fas fa-users"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Leitores cadastrados</h3>
                </div>
                <p id="stat-leitores" class="text-4xl font-bold text-emerald-600">0</p>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 card-stat">
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-purple-50 rounded-lg text-purple-600">
                        <i class="fas fa-book"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Livros disponíveis</h3>
                </div>
                <p id="stat-livros" class="text-4xl font-bold text-purple-700">0</p>
            </div>
        </div>

        <!-- Dashboard -->
        <section id="tab-dashboard" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Formulário -->
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex items-center gap-2 mb-6">
                        <i class="fas fa-plus-circle text-indigo-600"></i>
                        <h2 class="text-xl font-bold text-slate-800">Novo Empréstimo</h2>
                    </div>
                    <form id="form-emprestimo" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-slate-600 mb-1">Leitor</label>
                            <select id="emp-leitor" class="w-full border-slate-200 bg-slate-50 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" required>
                                <option value="">Carregando...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-600 mb-1">Livro</label>
                            <select id="emp-livro" class="w-full border-slate-200 bg-slate-50 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" required>
                                <option value="">Carregando...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-600 mb-1">Data Limite Devolução</label>
                            <input type="date" id="emp-data" class="w-full border-slate-200 bg-slate-50 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" required>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-all cursor-pointer">
                            Registrar Saída
                        </button>
                    </form>
                </div>

                <!-- Tabela -->
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 lg:col-span-2">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-list-ul text-slate-400"></i>
                            <h2 class="text-xl font-bold text-slate-800">Empréstimos Ativos</h2>
                        </div>
                        <span class="text-xs font-medium text-slate-400 bg-slate-100 px-2 py-1 rounded">Tempo Real</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-50">
                                    <th class="pb-4 px-2">Leitor</th>
                                    <th class="pb-4 px-2">Livro</th>
                                    <th class="pb-4 px-2">Prazo</th>
                                    <th class="pb-4 px-2">Status</th>
                                    <th class="pb-4 px-2 text-right">Ação</th>
                                </tr>
                            </thead>
                            <tbody id="lista-emprestimos" class="divide-y divide-slate-50">
                                <!-- Conteúdo via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- Leitores -->
        <section id="tab-leitores" class="tab-content hidden">
            <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-2 mb-6">
                    <i class="fas fa-user-plus text-emerald-600"></i>
                    <h2 class="text-xl font-bold text-slate-800">Cadastrar Novo Leitor</h2>
                </div>
                <form id="form-leitor" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="lei-nome" placeholder="Nome Completo" class="w-full border-slate-200 bg-slate-50 p-3 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all" required>
                        <input type="text" id="lei-telefone" placeholder="Telefone" class="w-full border-slate-200 bg-slate-50 p-3 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all" required>
                    </div>
                    <input type="email" id="lei-email" placeholder="E-mail (Opcional)" class="w-full border-slate-200 bg-slate-50 p-3 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                    <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700 shadow-md shadow-emerald-200 transition-all cursor-pointer">
                        Salvar Leitor
                    </button>
                </form>
            </div>
        </section>

        <!-- Livros -->
        <section id="tab-livros" class="tab-content hidden">
            <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-2 mb-6">
                    <i class="fas fa-book-medical text-purple-600"></i>
                    <h2 class="text-xl font-bold text-slate-800">Adicionar Livro ao Acervo</h2>
                </div>
                <form id="form-livro" class="space-y-4">
                    <input type="text" id="liv-titulo" placeholder="Título da Obra" class="w-full border-slate-200 bg-slate-50 p-3 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition-all" required>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="liv-autor" placeholder="Autor / Escritor" class="w-full border-slate-200 bg-slate-50 p-3 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition-all" required>
                        <input type="number" id="liv-qtd" placeholder="Quantidade" class="w-full border-slate-200 bg-slate-50 p-3 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition-all" min="1" required>
                    </div>
                    <button type="submit" class="w-full bg-purple-600 text-white py-3 rounded-lg font-bold hover:bg-purple-700 shadow-md shadow-purple-200 transition-all cursor-pointer">
                        Salvar no Sistema
                    </button>
                </form>
            </div>
        </section>

    </main>

    <footer class="mt-12 py-8 border-t border-slate-200 text-center text-slate-400 text-sm">
        <p>© 2026 BioBiblio - Gestão de Bibliotecas Comunitárias</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
